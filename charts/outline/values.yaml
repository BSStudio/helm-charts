---
# -- Provide a name in place of `outline`
nameOverride: ""
# -- String to fully override `"outline.fullname"`
fullnameOverride: ""

image:
  # -- The Docker repository to pull the image from
  repository: outlinewiki/outline
  # -- The logic of image pulling
  imagePullPolicy: IfNotPresent
  # -- Overrides the image tag whose default is the chart appVersion
  tag: ""

# -- Secrets for pulling the image from a private registry
imagePullSecrets: []

# -- The number of replicas to deploy
replicaCount: 1

# -- Grace period for shutdown. Above Outline's own 60s force-quit timeout, so it is not killed
# mid-drain.
terminationGracePeriodSeconds: 75

# -- Deployment update strategy. When empty, defaults to `Recreate` if persistence
# is enabled with a non-`ReadWriteMany` access mode (avoids a RWO volume deadlock
# on upgrade), otherwise Kubernetes' default RollingUpdate is used.
strategy: {}
  # type: RollingUpdate
  # rollingUpdate:
  #   maxSurge: 1
  #   maxUnavailable: 0

serviceAccount:
  # -- Specifies whether a service account should be created
  create: true
  # -- Automatically mount a ServiceAccount's API credentials?
  automount: false
  # -- Annotations to add to the service account
  annotations: {}
  # -- The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template.
  name: ""

# -- Optional additional annotations to add to the pods
podAnnotations: {}

# -- Optional additional labels to add to the pods
podLabels: {}

# -- Pod-level security context, merged over chart defaults (fsGroup 65534 for volume writes)
podSecurityContext: {}
  # fsGroup: 2000

# -- Run containers as a specific securityContext
securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

# -- Init containers to add to the deployment
initContainers: []
  # - name: wait-for-postgres
  #   image: busybox:latest
  #   command: ['sh', '-c', 'do-something-here']

service:
  # -- Kubernetes service type for web traffic
  type: ClusterIP
  # -- Port number for web traffic
  port: 3000

ingress:
  # -- Enable an ingress resource
  enabled: false
  # -- Defines which ingress controller will implement the resource
  className: ""
  # -- Additional ingress annotations
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  # -- List of ingress hosts
  hosts: []
    #  - host: chart-example.local
    #    paths:
    #      - path: /
    #        pathType: Prefix
    # -- Ingress TLS configuration
  tls: []
    #  - secretName: chart-example-tls
    #    hosts:
    #      - chart-example.local

# -- Liveness probe for the container. Not /_health: it queries Postgres and Redis, so an outage
# would restart every replica.
livenessProbe:
  tcpSocket:
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  failureThreshold: 3

# -- Readiness probe for the container
readinessProbe:
  httpGet:
    path: /_health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  failureThreshold: 3

# -- Startup probe for the container
startupProbe:
  httpGet:
    path: /_health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  failureThreshold: 30

resources:
  limits:
    # -- The maximum amount of CPU the container can use
    cpu: 1000m
    # -- The maximum amount of memory the container can use
    memory: 1Gi
  requests:
    # -- Specifies the minimum amount of CPU that will be allocated to the container
    cpu: 250m
    # -- Specifies the minimum amount of memory that will be allocated to the container
    memory: 1Gi

persistence:
  # -- Determines whether persistent storage is enabled or not
  enabled: true
  # -- Specifies the level of access to the persistent storage (e.g., read-write, read-only)
  accessMode: ReadWriteOnce
  # -- Defines the amount of storage allocated for persistence
  size: 2Gi
  # -- Annotations to add to the PVC, e.g. `helm.sh/resource-policy: keep` to retain data on uninstall
  annotations: {}
  # -- You can also use an existing claim instead of creating one
  # existingClaim: "myClaim"
  # -- If defined, volume.beta.kubernetes.io/storage-class: <storageClass>
  # If the value is "-" or not defined, volume.alpha.kubernetes.io/storage-class: default
  # storageClass:

autoscaling:
  # -- Controls whether autoscaling is enabled or disabled for the application
  enabled: false
  # -- Defines the minimum number of application instances (replicas) to maintain, even during low demand
  minReplicas: 1
  # -- Sets the maximum number of application instances (replicas) that can be scaled up to during high demand
  maxReplicas: 100
  # -- Specifies the CPU utilization threshold at which autoscaling will be triggered
  # to adjust the number of replicas
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

pdb:
  # -- Enable a PodDisruptionBudget. With a single replica `minAvailable: 1` blocks node drains.
  enabled: false
  # -- Maximum unavailable pods (takes precedence over minAvailable when set)
  maxUnavailable: ""
  # -- Minimum available pods (used when maxUnavailable is unset; defaults to 1)
  minAvailable: ""

# -- Additional environment variables, appended to the container verbatim. Prefer `config` and
# `secrets`; entries here take precedence over both.
env: []
  # - name: ENV_VAR_NAME
  #   value: VALUE
  # - name: ENV_VAR_OTHER
  #   valueFrom:
  #     secretKeyRef:
  #       name: secret-name
  #       key: secret-key
  # - name: ENV_VAR_ANOTHER
  #   valueFrom:
  #     configMapKeyRef:
  #       name: config-map-name
  #       key: config-map-key

# -- Additional envFrom sources appended to the container
extraEnvFrom: []
  # - configMapRef:
  #     name: config-map-name
  # - secretRef:
  #     name: secret-name

# -- Additional volumes to mount to the deployment
extraVolumes: []
  # - name: foo
  #   secret:
  #     secretName: mysecret
  #     optional: false

# -- Additional volume mounts for the containers
extraVolumeMounts: []
  # - name: foo
  #   mountPath: "/etc/foo"
  #   readOnly: true

# -- NodeSelector for the deployment
nodeSelector: {}

# -- Tolerations for the deployment
tolerations: []

# -- Affinity for the deployment
affinity: {}

# -- Non-secret environment variables rendered into a ConfigMap. Keys are the literal names from
# <https://github.com/outline/outline/blob/main/.env.sample>.
config:
  # -- Fully qualified, publicly accessible URL
  URL: https://outline.example.com
  # -- Redirect HTTP to HTTPS in the application. Leave false when TLS is terminated by the ingress.
  FORCE_HTTPS: "false"
  # -- SSL mode for connecting to PostgreSQL
  PGSSLMODE: disable
  # -- Storage system to use, either "s3" or "local"
  FILE_STORAGE: local
  # -- Maximum allowed byte size for an uploaded attachment. Must be a string.
  FILE_STORAGE_UPLOAD_MAX_SIZE: "50000000"

# -- Read the sensitive environment variables from an existing Secret instead of `secrets`. Its keys
# must be the environment variable names. The connection strings below are still chart-managed.
existingSecret: ""

# -- Sensitive environment variables rendered into a Secret. Keys are the literal names from
# <https://github.com/outline/outline/blob/main/.env.sample>. DATABASE_URL and REDIS_URL default to
# the bundled sub-charts; set them to point at an external database or cache.
secrets:
  # -- Hex-encoded 32-byte random key. Generate with `openssl rand -hex 32`.
  SECRET_KEY: ""
  # -- Unique random key. Generate with `openssl rand -hex 32`.
  UTILS_SECRET: ""
  # DATABASE_URL: ""
  # REDIS_URL: ""

scheduler:
  # -- Create a CronJob to run Outline's scheduled jobs.
  # Refer to <https://docs.getoutline.com/s/hosting/doc/scheduled-jobs-RhZzCt770H> for more information.
  enabled: true
  # -- Schedule to use for the CronJob
  schedule: 30 12 * * *
  # -- Timezone for interpreting the cron schedule
  timeZone: Europe/Budapest
  # -- Concurrency policy for the CronJob
  concurrencyPolicy: Forbid
  # -- Hard time limit for a single run before it is killed (guards against a hung request)
  activeDeadlineSeconds: 300
  # -- Number of retries before a run is marked failed
  backoffLimit: 1
  # -- How many completed jobs to retain
  successfulJobsHistoryLimit: 3
  # -- How many failed jobs to retain for debugging
  failedJobsHistoryLimit: 3
  # -- Optional additional annotations to add to the CronJob runner pod
  annotations: {}
  # -- Optional additional labels to add to the CronJob runner pod
  labels: {}
  # -- Pod-level security context for the runner pod, merged over the chart defaults
  podSecurityContext: {}
  # -- Container-level security context for the runner container, merged over the chart defaults
  securityContext: {}

minio:
  # -- Enable the CloudPirates MinIO® chart.
  # Refer to <https://github.com/CloudPirates-io/helm-charts/blob/main/charts/minio> for possible values.
  enabled: false

postgres:
  # -- Enable the CloudPirates PostgreSQL chart.
  # Refer to <https://github.com/CloudPirates-io/helm-charts/blob/main/charts/postgres> for possible values.
  enabled: true
  auth:
    # -- Name for a custom user to create
    username: outline
    # -- Name for a custom database to create
    database: outline
    # -- Password for the custom user. Required, and must be URL-safe: it is interpolated into
    # `outline.database_url`.
    password: ""
  resources:
    limits:
      # -- The maximum amount of CPU the container can use
      cpu: 500m
      # -- The maximum amount of memory the container can use
      memory: 512Mi
    requests:
      # -- Specifies the minimum amount of CPU that will be allocated to the container
      cpu: 250m
      # -- Specifies the minimum amount of memory that will be allocated to the container
      memory: 512Mi
  containerSecurityContext:
    # -- Run container processes as non-root user nobody
    runAsUser: 65534
    # -- Run container processes with nobody group
    runAsGroup: 65534
    seccompProfile:
      # -- Use the container runtime default seccomp profile
      type: RuntimeDefault

redis:
  # -- Enable the CloudPirates Redis® chart.
  # Refer to <https://github.com/CloudPirates-io/helm-charts/blob/main/charts/redis> for possible values.
  enabled: true
  auth:
    # -- Enable password authentication
    enabled: false
  resources:
    limits:
      # -- The maximum amount of CPU the container can use
      cpu: 150m
      # -- The maximum amount of memory the container can use
      memory: 256Mi
    requests:
      # -- Specifies the minimum amount of CPU that will be allocated to the container
      cpu: 50m
      # -- Specifies the minimum amount of memory that will be allocated to the container
      memory: 256Mi
  containerSecurityContext:
    # -- Run container processes as non-root user nobody
    runAsUser: 65534
    # -- Run container processes with nobody group
    runAsGroup: 65534
