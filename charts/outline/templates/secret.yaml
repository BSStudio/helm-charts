apiVersion: v1
kind: Secret
metadata:
  name: {{ include "outline.fullname" . }}
  labels:
    {{- include "outline.labels" . | nindent 4 }}
type: Opaque
data:
  {{- include "outline.env" (dict "root" . "values" (fromYaml (include "outline.settings" .))) | indent 2 }}
  {{- include "outline.envVars" . | indent 2 }}
